name: stage_app
description: Stagebegeleiding app (Android/iOS) met Excel-import en bezoekregistratie.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  uuid: ^4.4.0
  path: ^1.9.0
  path_provider: ^2.1.4
  sqflite: ^2.3.3+1
  excel: ^4.0.6
  file_picker: ^8.1.2
  supabase_flutter: ^2.7.0
  flutter_dotenv: ^5.2.1
  connectivity_plus: ^6.0.5
  sqflite_common_ffi: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
